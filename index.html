<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8'/>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'/>
  <meta http-equiv='X-UA-Compatible' content='ie=edge'/>
  <title>GitHub Search</title>
  <script src='js/index.js'></script>
  <link rel='stylesheet' href='index.css'/>
</head>
<body>
  <div id='main'>

    <h2>GitHub Search</h2>

    <form id='github-form'>
      <input id='search' type='text' name='search' placeholder="Enter keyword to search...">
      <input type='submit' name='submit' value='Search Users'/>
      <button type='button' id="searchToggle">Mode</button>
    </form>
    <p id="queryDiv"></p>

    <div id='github-container'>
      <div>
        <button id="backBtn"><<</button>
        <select id="pageSelector"></select>
        <button id="forwardBtn">>></button>
      </div>
      <ul id='user-list'>

      </ul>

      <p id="repoQuery"></p>
      <ul id='repos-list'>

      </ul>
    </div>

  </div>

</body>
</html>
